scene:
  root: data/scene_x
  images_dir: images
  predictions_path: vggt/predictions.npz
  proposals_path: init/proposals.pt
  output_path: init/fused_gaussians.pt

sampling:
  sigmas: [1.0, 1.6, 2.5, 4.0, 6.4, 10.0]
  response_threshold: 0.005
  max_keypoints_per_view: 12000
  confidence_percentile: 25.0
  min_distance: 3
  nms_radius_factor: 3.0
  structure_sigma_factor: 1.5
  ellipse_radius_factor: 2.5
  min_ellipse_area: 12.0
  max_ellipse_area: 800.0
  max_axis_ratio: 8.0

covariance:
  min_valid_points: 12
  min_valid_fraction: 0.6
  max_center_distance: null
  confidence_weighted: true
  device: auto
  pixel_budget: 2000000

pca:
  eigenvalue_epsilon: 1.0e-8
  scale_min: 1.0e-5
  scale_max: 1.0
  condition_max: 100000000.0

gaussian:
  opacity: 0.1

fusion:
  enabled: true
  voxel_size: 0.015

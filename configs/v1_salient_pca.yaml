scene:
  root: data/scene_x
  images_dir: images
  predictions_path: vggt/predictions.npz
  proposals_path: init/proposals.pt
  output_path: init/fused_gaussians.pt

sampling:
  mode: hybrid
  stride: 24
  max_samples_per_view: 10000
  confidence_threshold: 0.2
  salient_fraction: 0.6
  min_distance: 5

patch:
  radius: 3
  min_valid_points: 8
  max_center_distance: null

pca:
  eigenvalue_epsilon: 1.0e-8
  scale_min: 1.0e-5
  scale_max: 1.0
  condition_max: 5000.0

gaussian:
  opacity: 0.1

fusion:
  enabled: false
  voxel_size: 0.02
